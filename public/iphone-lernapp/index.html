<title>PhD Lernapp · KU Linz</title>
<style>
:root {
  --bg: #f5f4f0;
  --card: #ffffff;
  --accent: #2d3a2e;
  --accent2: #5c7a5e;
  --muted: #8a9a8b;
  --border: #d8d8d4;
  --text: #1a1a18;
  --text2: #4a4a46;
  --tag-bg: #e8ede8;
  --paper1: #2d3a5e;
  --paper2: #5e2d3a;
  --paper1-light: #e8edf5;
  --paper2-light: #f5e8ec;
  --flip-back: #2d3a2e;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --nav-h: 56px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Georgia, serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 16px;
  line-height: 1.7;
  padding-bottom: env(safe-area-inset-bottom);
  overscroll-behavior-y: none;
}

/* NAV */
nav {
  background: var(--accent);
  color: white;
  display: flex;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  padding-top: env(safe-area-inset-top);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.nav-inner { display: flex; align-items: center; padding: 0 16px; min-width: max-content; }
.nav-brand {
  font-size: 0.9rem; font-weight: bold;
  padding: 16px 16px 16px 0;
  border-right: 1px solid rgba(255,255,255,0.2);
  margin-right: 12px; color: rgba(255,255,255,0.9);
  white-space: nowrap;
}
.nav-tabs { display: flex; }
.nav-tab {
  padding: 18px 14px; cursor: pointer;
  font-family: sans-serif; font-size: 0.82rem;
  letter-spacing: 0.04em; text-transform: uppercase;
  color: rgba(255,255,255,0.6);
  border-bottom: 3px solid transparent;
  transition: all 0.2s; user-select: none; white-space: nowrap;
}
.nav-tab:hover { color: white; }
.nav-tab.active { color: white; border-bottom-color: #a8c5a8; }

/* LAYOUT */
.container { max-width: 1080px; margin: 0 auto; padding: 32px 20px; }

/* CARDS */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px 28px;
  box-shadow: var(--shadow);
  margin-bottom: 18px;
}

/* HOME */
.home-header { text-align: center; padding: 48px 0 32px; }
.home-header h1 { font-size: 2.2rem; color: var(--accent); margin-bottom: 10px; }
.home-header p { color: var(--text2); font-size: 1.05rem; max-width: 560px; margin: 0 auto; }
.paper-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 32px; }
.paper-card {
  background: var(--card); border-radius: var(--radius); padding: 28px;
  box-shadow: var(--shadow); cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  border-top: 4px solid var(--paper1);
}
.paper-card.p2 { border-top-color: var(--paper2); }
.paper-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
.paper-card h2 { font-size: 1.1rem; color: var(--accent); margin-bottom: 6px; }
.paper-card .subtitle { font-size: 0.82rem; color: var(--muted); font-family: sans-serif; margin-bottom: 12px; }
.quick-actions { margin-top: 28px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.install-card {
  margin: 0 auto 24px;
  max-width: 720px;
  padding: 18px 20px;
  background: linear-gradient(135deg, rgba(45,58,46,0.08), rgba(232,237,232,0.95));
  border: 1px solid rgba(45,58,46,0.12);
}
.install-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.install-copy {
  flex: 1;
  min-width: 240px;
}
.install-copy h2 {
  font-size: 1rem;
  color: var(--accent);
  margin-bottom: 4px;
  font-family: sans-serif;
}
.install-copy p {
  color: var(--text2);
  font-size: 0.92rem;
}
.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(45,58,46,0.1);
  color: var(--accent);
  font-family: sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.02em;
  margin-top: 10px;
}
.install-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

/* BUTTONS */
.btn {
  padding: 9px 18px; border-radius: 8px; border: none;
  cursor: pointer; font-family: sans-serif; font-size: 0.88rem;
  font-weight: 600; transition: all 0.2s;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent2); }
.btn-outline { background: transparent; color: var(--accent); border: 2px solid var(--accent); }
.btn-outline:hover { background: var(--accent); color: white; }
.btn-sm { padding: 6px 13px; font-size: 0.8rem; }
.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; background: transparent;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-family: sans-serif; font-size: 0.83rem;
  cursor: pointer; color: var(--text2); margin-bottom: 20px;
  transition: all 0.2s;
}
.back-btn:hover { background: var(--card); color: var(--accent); border-color: var(--accent); }

/* PAPER VIEW */
.paper-header {
  background: var(--card); border-radius: var(--radius); padding: 28px;
  box-shadow: var(--shadow); margin-bottom: 20px;
  border-left: 6px solid var(--paper1);
}
.paper-header.p2 { border-left-color: var(--paper2); }
.paper-header h1 { font-size: 1.4rem; color: var(--accent); margin-bottom: 4px; }
.paper-header .meta { font-family: sans-serif; font-size: 0.82rem; color: var(--muted); margin-bottom: 12px; }

.paper-nav {
  display: flex; gap: 0; background: var(--card);
  border-radius: var(--radius); padding: 5px;
  box-shadow: var(--shadow); margin-bottom: 20px; flex-wrap: wrap;
}
.paper-tab {
  flex: 1; padding: 9px 12px; text-align: center; cursor: pointer;
  border-radius: 8px; font-family: sans-serif; font-size: 0.82rem;
  font-weight: 600; color: var(--muted); transition: all 0.2s; min-width: 80px;
}
.paper-tab.active { background: var(--accent); color: white; }
.paper-tab:hover:not(.active) { background: var(--tag-bg); color: var(--accent); }

/* SECTION / ACCORDION */
.section { background: var(--card); border-radius: var(--radius); padding: 22px 28px; box-shadow: var(--shadow); margin-bottom: 14px; }
.section h3 { font-size: 1.05rem; color: var(--accent); margin-bottom: 14px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
.section p { color: var(--text2); margin-bottom: 10px; font-size: 0.96rem; }

.accordion-item { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 10px; overflow: hidden; }
.accordion-header {
  padding: 16px 22px; cursor: pointer; display: flex;
  justify-content: space-between; align-items: center;
  border-left: 4px solid var(--paper1); user-select: none;
  transition: background 0.15s;
}
.accordion-header.p2 { border-left-color: var(--paper2); }
.accordion-header:hover { background: var(--tag-bg); }
.accordion-header h4 { font-size: 0.98rem; color: var(--accent); }
.accordion-header .acc-toggle { font-size: 1.1rem; color: var(--muted); transition: transform 0.25s; }
.accordion-header.open .acc-toggle { transform: rotate(180deg); }
.accordion-body { padding: 0 22px 18px; font-size: 0.93rem; color: var(--text2); line-height: 1.7; display: none; }
.accordion-body.open { display: block; }

/* AUTHOR CARDS */
.authors-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
.author-card {
  background: var(--card); border-radius: var(--radius); padding: 20px;
  box-shadow: var(--shadow); border-left: 4px solid var(--paper1);
  cursor: pointer; transition: transform 0.18s;
}
.author-card.p2 { border-left-color: var(--paper2); }
.author-card:hover { transform: translateY(-2px); }
.author-card.expanded { background: var(--accent); }
.author-name { font-size: 1rem; font-weight: bold; color: var(--accent); margin-bottom: 3px; }
.author-card.expanded .author-name { color: white; }
.author-dates { font-family: sans-serif; font-size: 0.78rem; color: var(--muted); margin-bottom: 3px; }
.author-card.expanded .author-dates { color: rgba(255,255,255,0.6); }
.author-role { font-family: sans-serif; font-size: 0.83rem; color: var(--text2); font-style: italic; margin-bottom: 10px; }
.author-card.expanded .author-role { color: rgba(255,255,255,0.75); }
.author-detail h4 { font-size: 0.85rem; font-weight: bold; color: rgba(255,255,255,0.55); margin: 12px 0 4px; text-transform: uppercase; letter-spacing: 0.05em; font-family: sans-serif; }
.author-detail p { font-size: 0.87rem; line-height: 1.55; color: rgba(255,255,255,0.88); }
.author-expand-hint { font-family: sans-serif; font-size: 0.75rem; color: var(--muted); margin-top: 6px; }

/* BEGRIFFE */
.begriff-item { padding: 18px 0; border-bottom: 1px solid var(--border); }
.begriff-item:last-child { border-bottom: none; }
.begriff-name { font-size: 1.05rem; font-weight: bold; color: var(--accent); margin-bottom: 6px; }
.begriff-def { font-size: 0.93rem; color: var(--text2); margin-bottom: 8px; }
.begriff-detail { font-size: 0.88rem; color: var(--muted); font-style: italic; display: none; }
.begriff-detail.open { display: block; }
.begriff-meta { font-family: sans-serif; font-size: 0.78rem; color: var(--accent2); margin-top: 6px; }

/* TAGS */
.tag {
  display: inline-block; background: var(--tag-bg); color: var(--accent);
  padding: 2px 9px; border-radius: 20px; font-family: sans-serif;
  font-size: 0.75rem; margin: 2px; font-weight: 600;
}
.tag.p2 { background: var(--paper2-light); color: var(--paper2); }

/* FLASHCARDS */
.filter-tabs { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
.filter-tab {
  padding: 5px 12px; border-radius: 20px;
  border: 2px solid var(--border); background: var(--card);
  font-family: sans-serif; font-size: 0.8rem;
  cursor: pointer; transition: all 0.2s; font-weight: 600; color: var(--muted);
}
.filter-tab.active { border-color: var(--accent); background: var(--accent); color: white; }

.flashcard-area { text-align: center; padding: 10px 0; }
.flashcard-progress { font-family: sans-serif; font-size: 0.83rem; color: var(--muted); margin-bottom: 18px; }
.flashcard-container { perspective: 1000px; width: 480px; height: 300px; margin: 0 auto 24px; cursor: pointer; }
.flashcard-container.fc-tall { height: 440px; }
.flashcard {
  width: 100%; height: 100%; position: relative;
  transform-style: preserve-3d; transition: transform 0.5s;
}
.flashcard.flipped { transform: rotateY(180deg); }
.flashcard-face {
  position: absolute; width: 100%; height: 100%;
  backface-visibility: hidden; border-radius: var(--radius);
  display: flex; flex-direction: column; justify-content: center;
  align-items: center; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.12);
}
.flashcard-front { background: var(--card); }
.flashcard-back { background: var(--flip-back); color: white; transform: rotateY(180deg); }
.card-label {
  font-family: sans-serif; font-size: 0.72rem; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--muted); margin-bottom: 10px;
}
.flashcard-back .card-label { color: rgba(255,255,255,0.45); }
.card-main { font-size: 1.3rem; font-weight: bold; color: var(--accent); text-align: center; margin-bottom: 6px; }
.flashcard-back .card-main { color: white; font-size: 0.95rem; font-weight: normal; line-height: 1.55; }
.card-sub { font-size: 0.87rem; color: var(--muted); font-style: italic; }
.flashcard-back .card-sub { color: rgba(255,255,255,0.6); margin-top: 6px; font-size: 0.8rem; }
.flashcard-hint { font-family: sans-serif; font-size: 0.78rem; color: var(--muted); margin-bottom: 18px; }
.flashcard-controls { display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap; }

/* QUIZ */
.quiz-question {
  background: var(--card); border-radius: var(--radius); padding: 28px;
  box-shadow: var(--shadow); margin-bottom: 18px; text-align: center;
}
.quiz-question h2 { font-size: 1.15rem; color: var(--accent); line-height: 1.5; }
.quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.quiz-option {
  background: var(--card); border: 2px solid var(--border);
  border-radius: 10px; padding: 16px 18px; cursor: pointer;
  font-family: sans-serif; font-size: 0.88rem; text-align: left;
  transition: all 0.18s; color: var(--text); line-height: 1.45;
}
.quiz-option:hover:not(.answered) { border-color: var(--accent2); background: var(--tag-bg); }
.quiz-option.correct { border-color: #4a8a4a; background: #e8f5e8; color: #2a5a2a; }
.quiz-option.wrong { border-color: #c05050; background: #f5e8e8; color: #6a2a2a; }
.quiz-score { font-size: 2.5rem; font-weight: bold; color: var(--accent); }
.quiz-explanation {
  background: var(--tag-bg); border-radius: 8px; padding: 12px 16px;
  font-size: 0.88rem; color: var(--text2); margin-top: 16px;
  text-align: left; line-height: 1.55; display: none;
}
.quiz-explanation.show { display: block; }

/* RESPONSIVE */
@media (max-width: 680px) {
  .paper-cards { grid-template-columns: 1fr; }
  .authors-grid { grid-template-columns: 1fr; }
  .quiz-options { grid-template-columns: 1fr; }
  .flashcard-container { width: calc(100vw - 48px); height: 260px; }
  .flashcard-container.fc-tall { height: 380px; }
  .container { padding: 20px 14px; }
  .nav-brand { display: none; }
  .install-card { padding: 16px; }
}
</style>

  {
    title: "1. Problemstellung: Die Transparenzillusion",
    text: `1. Problemstellung: Die Transparenzillusion In der Designideologie der Gegenwart gilt als gelungen, was verschwindet. Ein Interface soll sich anfühlen wie kein Medium – dieses Versprechen durchzieht die gesamte Tradition des User-Experience-Design, von Don Normans Konzept der „natural mapping“, das Bedienoberflächen an die Intuition des Körpers binden will (Norman 1988, 188 f.), über das Paradigma des „invisible computing“ bis hin zur aktuellen Doktrin des „frictionless design“. Die Formulierung ist so weit verbreitet, dass sie kaum noch als Aussage wahrgenommen wird: Sie gilt als Beschreibung eines Sachverhalts. Sie ist aber eine normative Setzung, und die Frage, was sie verdeckt, ist die Frage, um die dieses Paper kreist. Denn was verschwindet, wenn ein Interface „verschwindet“, ist nicht seine Wirkung – sondern die Wahrnehmbarkeit seiner Wirkung. Das Autocomplete-Feld, das nach dem dritten Buchstaben einen Satz zu Ende formuliert; die Zeichenbegrenzung, die bestimmte Ausdrucksformen strukturell bevorzugt; der Like-Button, der das Spektrum möglicher Reaktionen auf ein binäres Signal reduziert; das Predictive-Text-System, das kontinuierlich statistische Wahrscheinlichkeiten statt intentionale Bedeutung anbietet: All das sind Entscheidungen, die das Interface trifft, bevor ein Zeichen gesetzt wird. Interfaces produzieren Schreibbedingungen – und zwar solche, die sich nicht als Bedingungen zu erkennen geben. Interface-Rhetorik ist in der Forschung bislang aus drei Perspektiven beschrieben worden, die jeweils einen Aspekt erfassen und einen anderen verfehlen. Buchanan (1992) versteht Designrhetorik als visuelle Überzeugung: Das Interface überzeugt durch Anordnung, Farbe, Form – er denkt Rhetorik noch als bewusste Adressierung. Bogost (2008) entwickelt den Begriff der procedural rhetoric für Computerspiele: Regelarchitekturen machen Argumente über die Welt, aber es sind Argumente eines Designers an einen Spieler – die Intention bleibt im Spiel. Galloway (2004) beschreibt das Interface als Protokoll, das Zugänge verwaltet und Sichtbarkeiten reguliert – er denkt Macht, aber nicht Schreiben. Keiner der drei Ansätze entwickelt einen Begriff, der Rhetorik als operative Schreibbedingung fasst: als jene Architektur, die entscheidet, was sagbar ist, bevor Sprache beginnt. Diese Lücke zu schließen, ist das Ziel dieses Papers. Der Begriff der operativen Rhetorik , der hier entwickelt wird, ist weder Fortschreibung von Buchanan noch Erweiterung von Bogost – er bezeichnet eine strukturell andere Wirkungsweise: Überzeugung durch Architektur statt durch Sprache, eine Rhetorik, die wirkt ohne zu adressieren. Zu ihrer Analyse werden vier Ebenen entfaltet, auf denen Interfaces als Schreibsysteme operieren: die technische Ebene (Kittler), die affektive Ebene (Chun, Berlant), die epistemische Ebene (Krämer, Hayles) und die politische Ebene (Noble, Benjamin). McLuhan steht am Anfang – nicht als Fundament, sondern als Ausgangsproblem, dessen Grenzen den Einstieg in die eigentliche Analyse motivieren.`

  {

    text: `2. McLuhan: Diagnose ohne Lösung Marshall McLuhans Formel „The medium is the message“ ist für dieses Paper beides: unverzichtbarer Ausgangspunkt und produktiv unzureichend. Unverzichtbar, weil McLuhan den analytischen Blick grundlegend verschiebt – weg vom Inhalt, hin zur medialen Struktur. Das Medium ist nicht Kanal, sondern Umgebung: Es formt Wahrnehmungsmuster, Zeitgefühle, Nähe- und Distanzrelationen, noch bevor es etwas Bestimmtes kommuniziert (McLuhan 1964, 7–23). Das elektrische Licht hat keinen Inhalt, und doch reorganisiert es soziales Leben vollständig. Ein Interface hat Inhalte – und doch liegt seine entscheidende Wirkung nicht in ihnen. Produktiv unzureichend, weil McLuhan das Medium als stabile Entität denkt. Das Fernsehen ist das Fernsehen. Die Schrift ist die Schrift. McLuhans Medien haben keine Rückkopplungsschleifen, keine Lernfähigkeit, kein Gedächtnis für ihre Nutzer*innen. Was er nicht denken kann – und was das digitale Interface strukturell neu macht – ist, dass das Interface seine Nutzer*innen kennt. Es hat bisherige Eingaben gespeichert, sie mit Millionen anderer Nutzer*innen korreliert, und daraus ein statistisches Modell des nächsten Wunsches gebaut. Die Schreibbedingung, die es erzeugt, ist keine universelle – sie ist personalisiert . McLuhans Medium erzeugt eine Umwelt für alle. Das digitale Interface erzeugt eine Umwelt, die auf jeden einzeln zugeschnitten ist und sich dabei selbst unsichtbar macht. Das ist keine Marginalie, sondern ein kategorialer Unterschied. McLuhan benennt das Problem in seiner grundsätzlichsten Form: Medien formen Wahrnehmungs- und Schreibbedingungen, bevor Bedeutung entsteht. Aber er kann das digitale Interface nicht beschreiben, weil er kein Konzept für Algorithmen, Personalisierung und Feedback-Loops hat. Für diese Tiefendimension braucht es Kittler – einen Begriff des Schreibens, der nicht bei der Wahrnehmungsumwelt stehen bleibt, sondern die technische Infrastruktur des Ausdrucks selbst befragt.`

rts Begriff dazu tendiert, Macht in Stimmung aufzulösen, besteht operative Rhetorik darauf, dass ihre Strukturen benennbar, analysierbar und politisch sind. Auf den vier Ebenen, die dieses Paper entfaltet hat, lässt sich operative Rhetorik nun präzise bestimmen: Technisch wirkt sie als Aufschreibesystem, das Entscheidungen vorwegnimmt, bevor Intentionen entstehen (Kittler). Affektiv wirkt sie als Gewohnheitsarchitektur, die Bindungen an einschränkende Strukturen als zweite Natur stabilisiert (Chun, Berlant). Epistemisch wirkt sie als Sprechaktbedingung und als materielle Verteilung von Autor*innenschaft, die das Feld des Sagbaren vorzeichnet und die Instabilität des Textes verdeckt (Krämer, Hayles). Politisch wirkt sie als Normalisierungsmaschine, die soziale Hierarchien als Neutralität darstellt und Diskriminierung als Datenlage (Noble, Benjamin). Diese vier Ebenen sind analytisch trennbar – im Interface-Gebrauch sind sie untrennbar. Was leistet der Begriff der operativen Rhetorik, das die Einzeltheorien nicht leisten? Er ermöglicht, eine Interface-Architektur gleichzeitig als technisches Dispositiv, als affektive Bindung, als epistemische Rahmung und als politische Normierung zu lesen – und diese Dimensionen nicht als additive Liste, sondern als verschränktes Wirkungsgefüge zu beschreiben. Der Default einer Suchmaschine etwa ist technisch (er basiert auf einem algorithmischen Modell), affektiv (er wird durch Gewohnheit stabilisiert), epistemisch (er rahmt, was als plausibel gilt) und politisch (er privilegiert bestimmte Sichtbarkeiten). Ohne den Begriff der operativen Rhetorik bleiben diese Dimensionen disziplinär getrennt: Informatik beschreibt das Modell, Psychologie die Gewohnheit, Linguistik die Rahmung, Soziologie die Diskriminierung. Operative Rhetorik ist der Versuch, sie als ein und denselben Vorgang zu denken – als eine Rhetorik, die ihre Wirkung gerade dadurch entfaltet, dass sie auf allen Ebenen gleichzeitig und auf keiner sichtbar operiert. Das vorlieg     <div class="paper-header ${cc}">
      <div class="meta">${paper.type} · ${paper.date}</div>
      <h1>${paper.title}</h1>
      <p style="font-style:italic;color:var(--text2);font-size:0.92rem;margin-top:4px">${paper.subtitle}</p>
    </div>
    <div class="paper-nav">
      ${tabs.map(t => `<div class="paper-tab ${state.paperTab === t.id ? 'active' : ''}" onclick="setPaperTab('${t.id}')">${t.label}</div>`).join('')}
    </div>
    ${content}
  `;
}

function renderOverview(paper, cc) {
  return `
    <div class="section"><h3>Abstract</h3><p>${paper.abstract}</p></div>
    <div class="section"><h3>Hauptthese</h3><p>${paper.hauptthese}</p></div>
    <div class="section">
      <h3>Kernbegriffe</h3>
      <div>${paper.kernbegriffe.map(k => `<span class="tag ${cc}">${k.name}</span>`).join('')}</div>
    </div>
    <div class="section">
      <h3>Quellen auf einen Blick</h3>
      ${paper.authors.map(a => `
        <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--border)">
          <span style="font-weight:bold;min-width:180px">${a.name}</span>
          <span style="font-size:0.82rem;color:var(--muted)">${a.dates}</span>
          <span style="font-size:0.87rem;color:var(--text2);font-style:italic">${a.rolle}</span>
        </div>
      `).join('')}
    </div>
  `;
}

function renderVolltext(pid, cc) {
  const chapters = pid === 'p1' ? INTERFACE_CHAPTERS : SENTIENCE_CHAPTERS;
  return chapters.map((ch, i) => `
    <div class="accordion-item">
      <div class="accordion-header ${cc} ${state.expandedChapter === pid+i ? 'open' : ''}" onclick="toggleChapter('${pid}${i}')">
        <h4>${ch.title}</h4>
        <span class="acc-toggle">▾</span>
      </div>
      <div class="accordion-body ${state.expandedChapter === pid+i ? 'open' : ''}">
        ${ch.text.split('. ').reduce((acc, sent, j, arr) => {
          // Group into paragraphs of ~4 sentences
          if (j % 4 === 0) acc.push([]);
          acc[acc.length-1].push(sent + (j < arr.length-1 ? '. ' : ''));
          return acc;
        }, []).map(g => `<p>${g.join('')}</p>`).join('')}
      </div>
    </div>
  `).join('');
}

function renderAufbau(paper, cc) {
  const accentColor = cc === 'p2' ? 'var(--paper2)' : 'var(--paper1)';
  return `<div class="section"><h3>Kapitelstruktur</h3>
    ${paper.aufbau.map(k => `
      <div style="border-left:3px solid ${accentColor};padding:12px 16px;margin-bottom:10px;background:var(--tag-bg);border-radius:0 8px 8px 0">
        <div style="font-weight:bold;color:var(--accent);margin-bottom:4px;font-family:sans-serif;font-size:0.9rem">${k.nr}. ${k.titel}</div>
        <p style="font-size:0.9rem;color:var(--text2);margin:0">${k.inhalt}</p>
      </div>
    `).join('')}
  </div>`;
}

function renderAuthors(paper, cc) {
  return `<div class="authors-grid">${paper.authors.map(a => {
    const exp = state.expandedAuthor === a.id;
    return `<div class="author-card ${cc} ${exp ? 'expanded' : ''}" onclick="toggleAuthor('${a.id}')">
      <div class="author-name">${a.name}</div>
      <div class="author-dates">${a.dates}</div>
      <div class="author-role">${a.rolle}</div>
      ${exp ? `<div class="author-detail">
        <h4>Wer?</h4><p>${a.kontext}</p>
        <h4>📚 Forschung / Werk</h4><p><em>${a.werk}</em></p>
        <h4>✏️ Meine Verwendung</h4><p>${a.verwendung}</p>
        <div style="margin-top:8px">${a.konzepte.map(k => `<span class="tag ${cc}">${k}</span>`).join('')}</div>
      </div>` : `<div class="author-expand-hint">Anklicken für Details</div>`}
    </div>`;
  }).join('')}</div>`;
}

function renderBegriffe(paper, cc) {
  return `<div class="section"><h3>Kernbegriffe – detailliert</h3>
    ${paper.kernbegriffe.map((k, i) => {
      const exp = state.expandedBegriff === paper.id + i;
      return `<div class="begriff-item">
        <div class="begriff-name" style="cursor:pointer" onclick="toggleBegriff('${paper.id}${i}')">
          ${k.name} <span style="font-size:0.75rem;color:var(--muted);font-family:sans-serif;font-weight:normal">${exp ? '▲ einklappen' : '▼ mehr'}</span>
        </div>
        <div class="begriff-def">${k.kurz}</div>
        <div class="begriff-detail ${exp ? 'open' : ''}">${k.lang}</div>
        <div class="begriff-meta">→ ${k.verbindung}</div>
      </div>`;
    }).join('')}
  </div>`;
}

// ---- FLASHCARDS ----
function renderFlashcards() {
  const filters = [{id:'all',label:'Alle'},{id:'p1',label:'Interface Rhetorik'},{id:'p2',label:'Synthetic Sentience'}];
  const modes = [{id:'name-to-role',label:'Name → Wer?'},{id:'role-to-name',label:'Beschreibung → Name?'},{id:'name-to-usage',label:'Name → Verwendung?'}];
  const filtered = state.fcFilter === 'all' ? ALL_AUTHORS : ALL_AUTHORS.filter(a => a.paper === state.fcFilter);
  const idx = state.fcIndex % filtered.length;
  const a = filtered[idx];
  if (!a) return '<p>Keine Karten.</p>';

  let frontHTML = '', backHTML = '';
  if (state.fcMode === 'name-to-role') {
    frontHTML = `<div class="card-label">Wer ist das?</div><div class="card-main">${a.name}</div><div class="card-sub">${a.dates} · ${a.paperTitle}</div>`;
    backHTML = `<div class="card-label">Antwort</div><div style="font-size:1rem;font-weight:bold;margin-bottom:6px">${a.rolle}</div><div style="font-size:0.82rem;opacity:0.85;margin-bottom:10px;line-height:1.5">${a.kontext}</div><div style="font-size:0.72rem;opacity:0.55;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px">Verwendetes Werk</div><div style="font-size:0.8rem;opacity:0.8;font-style:italic;line-height:1.4">${a.werk}</div>`;
  } else if (state.fcMode === 'role-to-name') {
    frontHTML = `<div class="card-label">Wer ist das?</div><div style="font-size:1rem;font-weight:bold;color:var(--accent);margin-bottom:8px;text-align:center">${a.rolle}</div><div style="font-size:0.8rem;color:var(--muted);margin-bottom:10px;text-align:center">${a.dates}</div><div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:3px">Verwendetes Werk</div><div style="font-size:0.82rem;color:var(--text2);font-style:italic;text-align:center;line-height:1.4">${a.werk}</div>`;
    backHTML = `<div class="card-label">Antwort</div><div class="card-main">${a.name}</div><div style="font-size:0.82rem;opacity:0.75;margin-top:8px;line-height:1.5">${a.kontext}</div>`;
  } else {
    frontHTML = `<div class="card-label">Was verwendest du von …?</div><div class="card-main">${a.name}</div><div class="card-sub">${a.dates} · ${a.rolle}</div>`;
    backHTML = `<div style="width:100%;text-align:left;overflow-y:auto;max-height:100%"><div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;opacity:0.55;margin-bottom:3px">📚 Forschung der Quelle</div><div style="font-size:0.78rem;opacity:0.8;margin-bottom:12px;line-height:1.45;font-style:italic">${a.kontext}<br><br><em>${a.werk}</em></div><div style="border-top:1px solid rgba(255,255,255,0.2);padding-top:10px"><div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;opacity:0.55;margin-bottom:3px">✏️ Meine Verwendung</div><div style="font-size:0.82rem;line-height:1.5">${a.verwendung}</div></div></div>`;
  }

  return `
    <button class="back-btn" onclick="showView('home')">← Übersicht</button>
    <h2 style="margin-bottom:20px;font-size:1.3rem;color:var(--accent)">Karteikarten</h2>
    <div class="filter-tabs">
      ${filters.map(f => `<button class="filter-tab ${state.fcFilter===f.id?'active':''}" onclick="setFcFilter('${f.id}')">${f.label}</button>`).join('')}
      <span style="margin:0 4px;color:var(--border)">|</span>
      ${modes.map(m => `<button class="filter-tab ${state.fcMode===m.id?'active':''}" onclick="setFcMode('${m.id}')">${m.label}</button>`).join('')}
    </div>
    <div class="flashcard-area">
      <div class="flashcard-progress">${idx+1} von ${filtered.length} · ${a.paperTitle}</div>
      <div class="flashcard-container ${state.fcMode==='name-to-usage'?'fc-tall':''}" onclick="flipCard()">
        <div class="flashcard ${state.fcFlipped?'flipped':''}">
          <div class="flashcard-face flashcard-front" style="flex-direction:column;justify-content:center;align-items:center;text-align:center">${frontHTML}</div>
          <div class="flashcard-face flashcard-back" style="flex-direction:column;justify-content:${state.fcMode==='name-to-usage'?'flex-start':'center'};align-items:${state.fcMode==='name-to-usage'?'flex-start':'center'};text-align:${state.fcMode==='name-to-usage'?'left':'center'};padding:${state.fcMode==='name-to-usage'?'20px':'28px'}">${backHTML}</div>
        </div>
      </div>
      <div class="flashcard-hint">Karte anklicken zum Umdrehen</div>
      <div class="flashcard-controls">
        <button class="btn btn-outline btn-sm" onclick="fcNav(-1)">← Zurück</button>
        <button class="btn btn-primary btn-sm" onclick="fcNav(1)">Nächste →</button>
      </div>
    </div>
  `;
}

// ---- QUIZ ----
function buildQuiz(filter) {
  let pool = [];
  if (filter === 'all' || filter === 'p1') pool = pool.concat(QUIZ_BANK.p1);
  if (filter === 'all' || filter === 'p2') pool = pool.concat(QUIZ_BANK.p2);
  // shuffle and take 15
  return pool.sort(() => Math.random()-0.5).slice(0,15);
}

function renderQuiz() {
  const quizFilters = [{id:'all',label:'Beide Papers'},{id:'p1',label:'Interface Rhetorik'},{id:'p2',label:'Synthetic Sentience'}];

  if (!state.quizQuestions.length) {
    return `
      <button class="back-btn" onclick="showView('home')">← Übersicht</button>
      <div class="quiz-question">
        <h2>Quiz</h2>
        <p style="margin-bottom:20px;color:var(--muted)">Tiefe Inhaltsfragen zu beiden Papers</p>
        <div style="margin-bottom:20px">
          <div style="font-family:sans-serif;font-size:0.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px">Themenbereich wählen</div>
          <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
            ${quizFilters.map(f => `<button class="filter-tab ${state.quizFilter===f.id?'active':''}" onclick="setQuizFilter('${f.id}')">${f.label}</button>`).join('')}
          </div>
        </div>
        <button class="btn btn-primary" onclick="startQuiz()">Quiz starten (15 Fragen)</button>
      </div>
    `;
  }

  if (state.quizDone) {
    const pct = Math.round((state.quizScore/state.quizQuestions.length)*100);
    const msg = pct >= 87 ? '🎉 Exzellent!' : pct >= 70 ? '👍 Sehr gut!' : pct >= 50 ? '📖 Weiterüben!' : '💪 Nochmal von vorn!';
    return `
      <button class="back-btn" onclick="showView('home')">← Übersicht</button>
      <div class="quiz-question" style="padding:48px">
        <p style="font-family:sans-serif;font-size:0.82rem;color:var(--muted);margin-bottom:10px">Ergebnis</p>
        <div class="quiz-score">${state.quizScore} / ${state.quizQuestions.length}</div>
        <p style="margin:12px 0;font-size:1.2rem">${msg}</p>
        <p style="color:var(--muted);font-size:0.88rem">${pct}% richtig</p>
        <div style="margin-top:24px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="startQuiz()">Nochmal</button>
          <button class="btn btn-outline" onclick="resetQuiz()">Anderen Modus</button>
          <button class="btn btn-outline" onclick="showView('flashcards')">Karteikarten</button>
        </div>
      </div>
    `;
  }

  const q = state.quizQuestions[state.quizIndex];
  return `
    <button class="back-btn" onclick="showView('home')">← Übersicht</button>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-family:sans-serif;font-size:0.82rem;color:var(--muted)">
      <span>Frage ${state.quizIndex+1} / ${state.quizQuestions.length}</span>
      <span>Punkte: ${state.quizScore}</span>
    </div>
    <div class="quiz-question"><h2>${q.q}</h2></div>
    <div class="quiz-options">
      ${q.opts.map((opt, i) => {
        let cls = '';
        if (state.quizAnswered !== null) {
          if (i === q.correct) cls = 'correct';
          else if (i === state.quizAnswered) cls = 'wrong';
        }
        return `<button class="quiz-option ${cls} ${state.quizAnswered!==null?'answered':''}" onclick="answerQuiz(${i})">${opt}</button>`;
      }).join('')}
    </div>
    ${state.quizAnswered !== null ? `
      <div class="quiz-explanation show">
        <strong>${state.quizAnswered === q.correct ? '✓ Richtig!' : '✗ Falsch.'}</strong> ${q.expl}
      </div>
      <div style="text-align:center;margin-top:14px">
        <button class="btn btn-primary" onclick="nextQuiz()">${state.quizIndex < state.quizQuestions.length-1 ? 'Nächste Frage →' : 'Ergebnis anzeigen'}</button>
      </div>
    ` : ''}
  `;
}

// =============================================================
// ACTIONS
// =============================================================
function showView(v) { state.view=v; state.paperTab='overview'; state.expandedAuthor=null; state.expandedBegriff=null; state.expandedChapter=null; window.scrollTo(0,0); render(); }
function showPaper(pid) { state.view=pid==='p1'?'paper1':'paper2'; state.paperTab='overview'; state.expandedAuthor=null; state.expandedBegriff=null; render(); updateNav(); }
function showAuthor(paperId, authorId) { state.view=paperId==='p1'?'paper1':'paper2'; state.paperTab='authors'; state.expandedAuthor=authorId; render(); updateNav(); setTimeout(()=>{ const el=document.querySelector('.author-card.expanded'); if(el) el.scrollIntoView({behavior:'smooth',block:'center'}); },100); }
function updateNav() { document.querySelectorAll('.nav-tab').forEach((t,i)=>t.classList.toggle('active',state.view===(['home','paper1','paper2','flashcards','quiz'])[i])); }
function setPaperTab(tab) { state.paperTab=tab; state.expandedAuthor=null; state.expandedBegriff=null; state.expandedChapter=null; render(); }
function toggleAuthor(id) { state.expandedAuthor=state.expandedAuthor===id?null:id; render(); }
function toggleBegriff(id) { state.expandedBegriff=state.expandedBegriff===id?null:id; render(); }
function toggleChapter(id) { state.expandedChapter=state.expandedChapter===id?null:id; render(); }
function setFcFilter(f) { state.fcFilter=f; state.fcIndex=0; state.fcFlipped=false; render(); }
function setFcMode(m) { state.fcMode=m; state.fcFlipped=false; render(); }
function flipCard() { state.fcFlipped=!state.fcFlipped; render(); }
function fcNav(dir) { const filtered=state.fcFilter==='all'?ALL_AUTHORS:ALL_AUTHORS.filter(a=>a.paper===state.fcFilter); state.fcIndex=((state.fcIndex+dir)+filtered.length)%filtered.length; state.fcFlipped=false; render(); }
function setQuizFilter(f) { state.quizFilter=f; render(); }
function resetQuiz() { state.quizQuestions=[]; state.quizIndex=0; state.quizAnswered=null; state.quizScore=0; state.quizDone=false; render(); }
function startQuiz() { state.quizQuestions=buildQuiz(state.quizFilter); state.quizIndex=0; state.quizAnswered=null; state.quizScore=0; state.quizDone=false; render(); }
function answerQuiz(idx) { if(state.quizAnswered!==null) return; state.quizAnswered=idx; if(idx===state.quizQuestions[state.quizIndex].correct) state.quizScore++; render(); }
function nextQuiz() { if(state.quizIndex<state.quizQuestions.length-1){ state.quizIndex++; state.quizAnswered=null; }else{ state.quizDone=true; } render(); }

function getAppStatusLabel() {
  const standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  if (standalone) return 'Installiert auf dem Home-Bildschirm';
  if (!navigator.onLine) return 'Offline im Browser';
  return 'Bereit fuer Safari und Home-Bildschirm';
}

function showInstallHelp() {
  window.alert(
    'So installierst du die App auf dem iPhone:\\n\\n' +
    '1. Link in Safari oeffnen\\n' +
    '2. Unten auf Teilen tippen\\n' +
    '3. "Zum Home-Bildschirm" waehlen\\n' +
    '4. Mit "Hinzufuegen" bestaetigen'
  );
}

async function copyAppLink() {
  try {
    await navigator.clipboard.writeText(window.location.href);
    window.alert('Link kopiert.');
  } catch (error) {
    window.prompt('Diesen Link kopieren:', window.location.href);
  }
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/iphone-lernapp/service-worker.js');
  });
}

window.addEventListener('online', render);
window.addEventListener('offline', render);

render();
</script>
</body>
</html>
